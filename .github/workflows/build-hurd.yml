name: Build X server (GNU/Hurd, experimental)

# GNU/Hurd build. There is no vmactions/hurd-vm, so this hand-rolls a QEMU VM
# the way vmactions does internally: boot Debian's pre-installed GNU/Hurd amd64
# image (rumpdisk → needs q35 + an AHCI disk), inject an ssh key into it (the
# image ships without a set password), wait for ssh, then build Xvfb + Xnest
# inside. This builds green; keep an eye on transient VM-boot flakiness.

on:
    workflow_dispatch:
    push:
        paths:
            - '.github/workflows/build-hurd.yml'
            - '.github/scripts/hurd/**'

jobs:
    xserver-build-hurd:
        runs-on: ubuntu-latest
        timeout-minutes: 120
        env:
            IMG_URL: https://cdimage.debian.org/cdimage/ports/latest/hurd-amd64/debian-hurd.img.tar.gz
        steps:
            - uses: actions/checkout@v6

            - name: Install QEMU + tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y qemu-system-x86 qemu-utils openssh-client

            - name: Fetch + extract Debian GNU/Hurd image
              run: |
                  set -eux
                  wget -q -O hurd.img.tar.gz "$IMG_URL"
                  tar -xzf hurd.img.tar.gz
                  ls -la debian-hurd-*.img

            - name: Inject ssh key into the image
              run: |
                  set -eux
                  ssh-keygen -t ed25519 -N '' -f hurd_key
                  img=$(echo debian-hurd-*.img)
                  loop=$(sudo losetup -fP --show "$img")
                  mkdir -p mnt
                  mounted=""
                  for part in "${loop}"p*; do
                      if sudo mount -t ext2 "$part" mnt 2>/dev/null; then
                          if [ -f mnt/etc/passwd ]; then mounted="$part"; break; fi
                          sudo umount mnt
                      fi
                  done
                  test -n "$mounted"
                  sudo mkdir -p mnt/root/.ssh
                  sudo cp hurd_key.pub mnt/root/.ssh/authorized_keys
                  sudo chmod 700 mnt/root/.ssh
                  sudo chmod 600 mnt/root/.ssh/authorized_keys
                  sudo chown -R 0:0 mnt/root/.ssh
                  # make sure sshd accepts root pubkey login
                  if [ -f mnt/etc/ssh/sshd_config ]; then
                      sudo sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' mnt/etc/ssh/sshd_config
                      sudo sed -i 's/^#*PubkeyAuthentication.*/PubkeyAuthentication yes/' mnt/etc/ssh/sshd_config
                  fi

                  # Boot is invisible on serial (GRUB + gnumach log to VGA),
                  # so we can't tell "booting" from "hung". Route the console to
                  # the serial port: dump grub.cfg for reference, point GRUB at
                  # serial, and append console=com0 to the gnumach (multiboot)
                  # line so kernel/Hurd messages reach qemu's -nographic stdio.
                  gcfg=""
                  for c in mnt/boot/grub/grub.cfg; do [ -f "$c" ] && gcfg="$c"; done
                  echo "----- grub.cfg (${gcfg:-not found}) -----"
                  [ -n "$gcfg" ] && sudo sed -n '1,80p' "$gcfg" || true
                  echo "------------------------------------------"
                  if [ -n "$gcfg" ]; then
                      sudo sed -i '1i serial --unit=0 --speed=115200\nterminal_input console serial\nterminal_output console serial' "$gcfg"
                      sudo sed -i '/^[[:space:]]*multiboot/ s/$/ console=com0/' "$gcfg"
                  fi

                  sudo umount mnt
                  sudo losetup -d "$loop"

            - name: Boot VM and build the xserver
              run: |
                  set -eux
                  img=$(echo debian-hurd-*.img)
                  # /dev/kvm exists on GH runners but the runner user lacks
                  # access by default (qemu: "failed to initialize kvm:
                  # Permission denied"); open it up, else fall back to slow TCG.
                  accel="-accel tcg"
                  if [ -e /dev/kvm ] && sudo chmod 666 /dev/kvm 2>/dev/null; then
                      accel="-enable-kvm"
                  fi
                  echo "==> qemu accel: $accel"
                  # amd64 Hurd uses rumpdisk, which needs the q35 machine and the
                  # disk on an AHCI/SATA controller — on the legacy IDE bus it
                  # fails with "ACPI PIC mode" + ext2fs wd0 I/O errors. Single CPU
                  # (GNU Mach hangs on -smp>1), >=2G RAM for rumpdisk.
                  qemu-system-x86_64 $accel -M q35 -m 4G \
                      -drive id=disk,file="$img",cache=writeback,format=raw,if=none \
                      -device ich9-ahci,id=ahci \
                      -device ide-hd,bus=ahci.0,drive=disk \
                      -net user,hostfwd=tcp:127.0.0.1:2222-:22 \
                      -net nic,model=e1000 \
                      -nographic > qemu.log 2>&1 &
                  qpid=$!
                  echo "$qpid" > qemu.pid

                  # fail fast if qemu didn't even start (e.g. KVM still denied)
                  sleep 8
                  if ! kill -0 "$qpid" 2>/dev/null; then
                      echo "::error::qemu exited immediately"; cat qemu.log; exit 1
                  fi

                  SSH="ssh -i hurd_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=8 -p 2222 root@127.0.0.1"
                  echo "==> waiting for ssh (booting Debian GNU/Hurd; console tail every ~minute)"
                  up=""
                  for i in $(seq 1 40); do
                      if ! kill -0 "$qpid" 2>/dev/null; then
                          echo "::error::qemu died during boot"; tail -120 qemu.log; exit 1
                      fi
                      if $SSH true 2>/dev/null; then up=1; break; fi
                      if [ $((i % 6)) -eq 0 ]; then
                          echo "----- qemu.log (boot console) after ${i} tries -----"
                          tail -25 qemu.log || true
                          echo "-----------------------------------------------------"
                      fi
                      sleep 10
                  done
                  if [ -z "$up" ]; then
                      echo "::error::SSH into the Hurd VM never came up"; tail -120 qemu.log; exit 1
                  fi

                  echo "==> running build inside the VM"
                  $SSH "REPO='${{ github.repository }}' SHA='${{ github.sha }}' sh -s" \
                      < .github/scripts/hurd/run-xserver-build.sh

            - name: Shut down VM
              if: always()
              run: |
                  [ -f qemu.pid ] && sudo kill "$(cat qemu.pid)" 2>/dev/null || true
                  tail -60 qemu.log 2>/dev/null || true
